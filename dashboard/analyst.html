<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMMUTRACE — My requests</title>
<style>
  body{margin:0;background:#0a142a;color:#e6edf7;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid #233a6f;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;margin:0;color:#ffd86b;letter-spacing:.04em}
  header .who{margin-left:auto;color:#98a8c5;font-size:13px}
  main{padding:20px;max-width:1000px;margin:0 auto}
  .empty{color:#98a8c5;padding:30px;text-align:center}
  .card{background:#0e1a36;border:1px solid #233a6f;border-radius:10px;padding:12px 16px;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .pfx{font-weight:700;color:#ffd86b}
  .st{font-size:11px;text-transform:uppercase;padding:2px 8px;border-radius:10px;border:1px solid #233a6f}
  .st.pending{background:#2a2410;color:#ffd86b}
  .st.approved{background:#13261d;color:#5ff0bd;border-color:#1f5a40}
  .st.rejected{background:#3a1414;color:#ff9b9b;border-color:#5a2424}
  .st.expired{background:#1a1f2e;color:#8aa}
  .meta{color:#98a8c5;font-size:12px;margin-top:4px}
  .just{margin:6px 0;color:#dbe6ff}
  .err{color:#ff8b8b;padding:20px}
</style></head>
<body>
<header><h1>◆ IMMUTRACE — My requests</h1><span class="who" id="who"></span></header>
<main id="main"><div class="empty">Loading…</div></main>
<script>
const F=(u,o)=>fetch(u,Object.assign({credentials:"same-origin"},o||{}));
function el(t,a,...c){const e=document.createElement(t);for(const k in (a||{}))k==="cls"?e.className=a[k]:e.setAttribute(k,a[k]);for(const x of c)e.append(x&&x.nodeType?x:document.createTextNode(x??""));return e;}
async function load(){
  const main=document.getElementById("main");
  const u=await (await F("/_immutrace/auth/me")).json();
  if(!u.authenticated){ main.innerHTML='<div class="err">Not logged in.</div>'; return; }
  document.getElementById("who").textContent=`${u.username} (${u.role})`;
  const r=await F("/_immutrace/approval/my");
  if(r.status!==200){ main.innerHTML='<div class="err">Could not load ('+r.status+').</div>'; return; }
  const reqs=(await r.json()).requests||[];
  main.innerHTML="";
  if(!reqs.length){ main.append(el("div",{cls:"empty"},"No requests yet. Access a protected endpoint to create one.")); return; }
  for(const q of reqs){
    const card=el("div",{cls:"card"});
    const meta=`#${q.id} · requested ${q.requested_at}`+(q.case_id?` · case ${q.case_id}`:"")
      +(q.decided_at?` · decided ${q.decided_at}`:"")+(q.expires_at&&q.status==="approved"?` · expires ${q.expires_at}`:"");
    card.append(
      el("div",{cls:"row"}, el("span",{cls:"pfx"},q.endpoint_prefix), el("span",{cls:"st "+q.status},q.status)),
      el("div",{cls:"just"}, q.justification),
      el("div",{cls:"meta"}, meta + (q.decision_note?` — “${q.decision_note}”`:"")));
    main.append(card);
  }
}
load(); setInterval(load,10000);
</script>
</body></html>
