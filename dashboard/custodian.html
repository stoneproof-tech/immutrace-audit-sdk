<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMMUTRACE — Custodian panel</title>
<style>
  body{margin:0;background:#0a142a;color:#e6edf7;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid #233a6f;display:flex;gap:12px;align-items:center}
  header h1{font-size:16px;margin:0;color:#ffd86b}
  header .who{margin-left:auto;color:#98a8c5;font-size:13px}
  main{padding:20px;max-width:820px;margin:0 auto}
  .card{background:#0e1a36;border:1px solid #233a6f;border-radius:10px;padding:16px;margin-bottom:14px}
  .k{color:#98a8c5}.v{font-weight:700;color:#ffd86b}
  .empty{color:#98a8c5}.err{color:#ff8b8b}
  button{border:0;border-radius:6px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px;background:#00e3a5;color:#03261c}
  .att{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #16243f}
  .att .grow{flex:1}
</style></head>
<body>
<header><h1>◆ IMMUTRACE — Custodian panel</h1><span class="who" id="who"></span></header>
<main id="main"><div class="card">Loading…</div></main>
<script>
const F=(u,o)=>fetch(u,Object.assign({credentials:"same-origin",headers:{"Content-Type":"application/json"}},o||{}));
async function render(){
  const main=document.getElementById("main");
  const me=await (await F("/_immutrace/auth/me")).json();
  if(!me.authenticated){ main.innerHTML='<div class="card err">Not logged in.</div>'; return; }
  document.getElementById("who").textContent=`${me.username} (${me.role})`;
  if(me.role!=="custodian"){ main.innerHTML='<div class="card err">Custodian role required. (Custodians never see other custodians’ share values.)</div>'; return; }
  const st=await (await F("/_immutrace/keys/status")).json();
  const mine=(st.custodians||[]).find(x=>x.username===me.username);
  main.innerHTML="";
  const c=document.createElement("div"); c.className="card";
  if(mine){
    c.innerHTML=`<div><span class="k">You are custodian</span> <span class="v">#${mine.id} — ${mine.name} (${mine.role_label})</span></div>`+
      `<div style="margin-top:6px" class="k">Your Shamir fragment is held encrypted to your key. You contribute it during a reassembly ceremony; you never see other custodians’ fragments.</div>`;
  } else {
    c.innerHTML='<div class="k">No custody fragment assigned to your account yet (admin must run key setup).</div>';
  }
  main.append(c);

  const c2=document.createElement("div"); c2.className="card";
  c2.innerHTML='<h3 style="margin:0 0 8px;color:#ffd86b">Pending reassembly ceremonies</h3>';
  const pend=(await (await F("/_immutrace/keys/reassembly")).json()).pending||[];
  if(!pend.length){ c2.append(Object.assign(document.createElement("div"),{className:"empty",textContent:"No pending ceremony."})); }
  for(const a of pend){
    const row=document.createElement("div"); row.className="att";
    row.append(Object.assign(document.createElement("span"),{textContent:`Attempt #${a.id} — ${a.shares_collected}/${a.threshold} shares`}));
    row.append(Object.assign(document.createElement("span"),{className:"grow"}));
    if(mine){
      const b=document.createElement("button"); b.textContent="Contribute my share";
      b.onclick=async()=>{ const r=await F(`/_immutrace/keys/reassembly/${a.id}/submit-share`,{method:"POST",body:JSON.stringify({custodian_id:mine.id})}); if(r.ok){alert("Your share was contributed.");render();} else alert("Failed: "+r.status); };
      row.append(b);
    }
    c2.append(row);
  }
  main.append(c2);
}
render(); setInterval(render,10000);
</script>
</body></html>
