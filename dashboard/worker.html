<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMMUTRACE — Anchor worker status</title>
<style>
  body{margin:0;background:#0a142a;color:#e6edf7;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid #233a6f;display:flex;gap:12px;align-items:center}
  header h1{font-size:16px;margin:0;color:#ffd86b}
  header .who{margin-left:auto;color:#98a8c5;font-size:13px}
  main{padding:20px;max-width:760px;margin:0 auto}
  .card{background:#0e1a36;border:1px solid #233a6f;border-radius:10px;padding:16px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse}
  td{padding:7px 8px;border-bottom:1px solid #16243f;font-size:14px}
  td.k{color:#98a8c5;width:38%}
  .pill{font-size:11px;text-transform:uppercase;padding:2px 10px;border-radius:10px;border:1px solid #233a6f}
  .ok{background:#13261d;color:#5ff0bd;border-color:#1f5a40}
  .warn{background:#2a2410;color:#ffd86b}
  .bad{background:#3a1414;color:#ff9b9b;border-color:#5a2424}
  .err{color:#ff8b8b}.mono{font-family:monospace;font-size:12px}
  a{color:#ffd86b}
</style></head>
<body>
<header><h1>◆ IMMUTRACE — Anchor worker</h1><span class="who" id="who"></span></header>
<main id="main"><div class="card">Loading…</div></main>
<script>
const F=(u)=>fetch(u,{credentials:"same-origin"});
function pill(txt,cls){return `<span class="pill ${cls}">${txt}</span>`;}
async function load(){
  const main=document.getElementById("main");
  const me=await (await F("/_immutrace/auth/me")).json();
  if(!me.authenticated){ main.innerHTML='<div class="card err">Not logged in.</div>'; return; }
  document.getElementById("who").textContent=`${me.username} (${me.role})`;
  if(me.role!=="admin"){ main.innerHTML='<div class="card err">Admin role required.</div>'; return; }
  const r=await F("/_immutrace/admin/worker/status");
  if(r.status!==200){ main.innerHTML='<div class="card err">Could not load ('+r.status+').</div>'; return; }
  const s=await r.json();
  const active = s.stopped ? pill("STOPPED — manual intervention","bad")
              : s.active ? pill("active","ok") : pill("inactive","warn");
  const txlink = s.last_anchor_tx && s.mode==="mainnet"
    ? `<a href="https://polygonscan.com/tx/${s.last_anchor_tx}" target="_blank">${s.last_anchor_tx.slice(0,18)}… ↗</a>`
    : (s.last_anchor_tx ? `<span class="mono">${s.last_anchor_tx.slice(0,18)}…</span>` : "—");
  main.innerHTML = `<div class="card"><table>
    <tr><td class="k">Status</td><td>${active}</td></tr>
    <tr><td class="k">Mode</td><td>${pill(s.mode, s.mode==="mainnet"?"warn":"")}</td></tr>
    <tr><td class="k">Balance</td><td>${s.balance_pol!=null? s.balance_pol+" POL":"—"}</td></tr>
    <tr><td class="k">Nonce</td><td>${s.nonce!=null? s.nonce:"—"}</td></tr>
    <tr><td class="k">Consecutive failures</td><td>${s.retry_count}</td></tr>
    <tr><td class="k">Last anchor at</td><td class="mono">${s.last_anchor_at||"—"}</td></tr>
    <tr><td class="k">Last anchor tx</td><td>${txlink}</td></tr>
    <tr><td class="k">Last error</td><td class="${s.last_error?'err':''}">${s.last_error||"none"}</td></tr>
    ${s.status_error?`<tr><td class="k">Status read error</td><td class="err">${s.status_error}</td></tr>`:""}
  </table></div>
  <div class="card" style="color:#98a8c5;font-size:13px">Emergency stop: set <code>MOCK_ANCHOR=true</code> in .env and restart the proxy. Refreshes every 30s.</div>`;
}
load(); setInterval(load,30000);
</script>
</body></html>
